<svg width="1640" height="720" viewBox="0 0 1640 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <!-- Gradient overlay for right side placeholder photo area -->
    <linearGradient id="rightOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3C2E" stop-opacity="0.7" />
      <stop offset="40%" stop-color="#1A3C2E" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1A3C2E" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Left brand panel -->
  <rect x="0" y="0" width="656" height="720" fill="#1A3C2E" />

  <!-- Right photo placeholder -->
  <rect x="656" y="0" width="984" height="720" fill="#333333" />
  <!-- Overlay gradient hinting at how a real photo would be treated -->
  <rect x="656" y="0" width="984" height="720" fill="url(#rightOverlay)" />

  <!-- Brand text -->
  <text
    x="80"
    y="200"
    fill="#FAF6EE"
    font-family="Playfair Display, 'Times New Roman', serif"
    font-size="80"
    font-weight="700"
  >
    Dublin Bites
  </text>

  <text
    x="80"
    y="270"
    fill="#FAF6EE"
    font-family="DM Sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="400"
  >
    Dublin's first food deals newsletter
  </text>

  <text
    x="80"
    y="315"
    fill="#FAF6EE"
    font-family="DM Sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="300"
  >
    Weekly restaurant deals, hidden gems and what's on — free.
  </text>

  <!-- Founding Members badge -->
  <rect
    x="80"
    y="360"
    rx="20"
    ry="20"
    width="260"
    height="46"
    fill="#C9A84C"
  />
  <text
    x="210"
    y="391"
    text-anchor="middle"
    fill="#1A3C2E"
    font-family="DM Sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="600"
    letter-spacing="2"
  >
    FOUNDING MEMBERS
  </text>

  <!-- Right side caption hint (can be removed once a real photo is used) -->
  <text
    x="1490"
    y="680"
    text-anchor="end"
    fill="#FFFFFF"
    fill-opacity="0.6"
    font-family="DM Sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="16"
  >
    Replace this area with a Dublin food photo
  </text>
</svg>

